<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Конфігуратор авточохлів Tuning Cobra</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- === БЛОК: Верхняя панель (заголовок) === -->
  <header id="topBar">
    <h1>Конфігуратор авточохлів Tuning Cobra</h1>
  </header>

  <div id="configurator">
    <!-- === БЛОК: Левая панель (основные опции) === -->
    <aside class="panel left" id="leftPanel">
      <h2>Основні опції</h2>

      <!-- Блок: выбор дизайна -->
      <label>Лінійка дизайну:
        <select id="designSelect">
          <option>Комфорт 1</option>
          <option>Комфорт Плюс 2</option>
          <option>Комфорт Плюс 3</option>
          <option>Спорт 3</option>
        </select>
      </label>

      <!-- Блок: колір основи -->
      <label>Колір основи:
        <select id="baseColorSelect"></select>
      </label>

      <!-- Блок: центр -->
      <label>Центр:
        <select id="centerSelect"></select>
      </label>

      <!-- Блок: Центр кожзам -->
      <label>
        <input type="checkbox" id="centerLaminCheckbox">
        Центр штучна шкіра
      </label>
      <select id="centerLaminColorSelect" disabled></select>

      <!-- Блок: Центр перфорация -->
      <label>
        <input type="checkbox" id="centerPerfaCheckbox">
        Центр перфорація
      </label>
      <select id="centerPerfaColorSelect" disabled></select>

      <!-- Блок: цветные вставки -->
      <label>
        <input type="checkbox" id="insertEnable"> Кольорові вставки
      </label>
      <select id="insertColorSelect"></select>

      <!-- Блок: внутренние вставки -->
      <label>Внутрішні вставки:
        <select id="innerInsertSelect"></select>
      </label>

      <!-- Блок: подголовники -->
      <label>Подголівники:
        <select id="headrestSelect">
          <option value="base">Ціл основа</option>
          <option value="center">Ціл центр</option>
        </select>
      </label>
    </aside>

    <!-- === БЛОК: Превью сиденья (основное изображение) === -->
    <main class="preview">
      <div id="seatPreview">
        <div id="layers" style="position:relative; width:100%; height:100%;"></div>
      </div>
    </main>

    <!-- === БЛОК: Правая панель (декор и допы) === -->
    <aside class="panel right" id="rightPanel">
      <h2>Декор та доповнення</h2>

      <!-- Блок: отделка (шов) -->
      <label>Оздоблення (шов):
        <select id="stitchColorSelect">
          <option value="черная">черная</option>
          <option value="бежевая">бежевая</option>
          <option value="белая">белая</option>
          <option value="бирюзовая">бирюзовая</option>
          <option value="бордовая">бордовая</option>
          <option value="бронзовая">бронзовая</option>
          <option value="желтая">желтая</option>
          <option value="зеленая">зеленая</option>
          <option value="коричневая">коричневая</option>
          <option value="красная">красная</option>
          <option value="оранжевая">оранжевая</option>
          <option value="розовая">розовая</option>
          <option value="рыжая">рыжая</option>
          <option value="светло-серая">светло-серая</option>
          <option value="серая">серая</option>
          <option value="синяя">синяя</option>
          <option value="голубая">голубая</option>
          <option value="фиолетовая">фиолетовая</option>
         </select>
      </label>

      <!-- Блок: вышивка -->
      <label>Вишивка (файл):
        <select id="embroiderySelect"></select>
      </label>

      <!-- Блок: полоса по центру -->
      <label>
        <input type="checkbox" id="stripeOption">
        Полоса по центру
      </label>

      <!-- Блок: цвет полосы -->
      <label>Колір смуги:
        <select id="stripeColorSelect">
          <option value="бежевая">бежевая</option>
          <option value="белая">белая</option>
          <option value="бирюзовая">бирюзовая</option>
          <option value="бордовая">бордовая</option>
          <option value="бронзовая">бронзовая</option>
          <option value="желтая">желтая</option>
          <option value="зеленая">зеленая</option>
          <option value="коричневая">коричневая</option>
          <option value="красная">красная</option>
          <option value="оранжевая">оранжевая</option>
          <option value="розовая">розовая</option>
          <option value="рыжая">рыжая</option>
          <option value="светло-серая">светло-серая</option>
          <option value="серая">серая</option>
          <option value="синяя">синяя</option>
          <option value="голубая">голубая</option>
          <option value="фиолетовая">фиолетовая</option>
          <option value="черная">черная</option>
        </select>
      </label>

      <!-- Блок: логотип -->
      <label>Логотип:
        <select id="logoSelect"></select>
      </label>

      <!-- Блок: включение логотипа -->
      <label>
        <input type="checkbox" id="logoEnable">
        Додати логотип
      </label>
    </aside>
  </div>

  <!-- === БЛОК: Подключение основного скрипта === -->
  <script src="script.js"></script>
</body>
</html>
